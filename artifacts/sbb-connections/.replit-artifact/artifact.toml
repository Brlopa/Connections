kind = "web"
previewPath = "/"
title = "Connections"
version = "1.0.0"
id = "artifacts/sbb-connections"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19008

[services.development]
run = "pnpm --filter @workspace/sbb-connections run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sbb-connections", "run", "build" ]
publicDir = "artifacts/sbb-connections/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19008"
BASE_PATH = "/"
